<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하은이 키워드 검사기</title>

<style>

body{
font-family:Malgun Gothic,sans-serif;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
box-sizing:border-box;
}

textarea{
width:100%;
height:350px;
padding:15px;
box-sizing:border-box;
}

button{
padding:12px 20px;
cursor:pointer;
margin-top:10px;
}

.info{
margin-top:20px;
font-size:18px;
}

.output{
margin-top:20px;
background:white;
padding:20px;
border:1px solid #ddd;
border-radius:10px;
white-space:pre-wrap;
line-height:1.8;
}

.highlight{
background:black;
color:white;
padding:2px 4px;
border-radius:4px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>하은이 키워드 검사기</h1>

<input
type="text"
id="keyword"
placeholder="키워드 입력">

<textarea
id="inputText"
placeholder="원고 붙여넣기"></textarea>

<br>

<button onclick="analyzeText()">
분석하기
</button>

<div class="info">

공백제외 글자수 : <span id="charCount">0</span>

<br><br>

키워드 횟수 : <span id="keywordCount">0</span>

</div>

<div
id="output"
class="output">
분석 결과가 표시됩니다.
</div>

</div>

<script>

function analyzeText(){

const text=
document.getElementById("inputText").value;

const keyword=
document.getElementById("keyword").value.trim();

const noSpace=
text.replace(/\s/g,'');

document.getElementById("charCount").innerText=
noSpace.length;

if(keyword){

const regex=
new RegExp(keyword,'g');

const count=
(text.match(regex)||[]).length;

document.getElementById("keywordCount").innerText=
count;

const highlighted=
text.replace(
regex,
'<span class="highlight">'+keyword+'</span>'
);

document.getElementById("output").innerHTML=
highlighted;

}else{

document.getElementById("keywordCount").innerText=
0;

document.getElementById("output").innerText=
text;

}

}

</script>

</body>
</html>
